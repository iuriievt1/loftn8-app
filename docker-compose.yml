services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: loftn8
      POSTGRES_PASSWORD: loftn8pass
      POSTGRES_DB: loftn8
    volumes:
      - loftn8_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loftn8 -d loftn8"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "/api"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - server
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

volumes:
  loftn8_db_data:
  caddy_data:
  caddy_config: